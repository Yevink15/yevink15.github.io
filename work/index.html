<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Work | YKCaptures</title>
  <meta name="description" content="Browse YKCaptures photography albums across esports, sports, campus events, and travel."/>
  <meta name="theme-color" content="#080b12"/>
  <meta property="og:title" content="YKCaptures Work"/>
  <meta property="og:description" content="Browse esports, sports, and live event photography by Yevin Kariyawasam."/>
  <meta property="og:url" content="https://ykcaptures.com/work/"/>
  <meta property="og:image" content="/assets/572.jpg"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="canonical" href="https://ykcaptures.com/work/"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png?v=3">
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <div class="nav-left">
      <a class="brand" href="/">YKCaptures</a>
      <a class="navlink" href="/work/">Work</a>
      <a class="navlink" href="/about/">About</a>
      <a class="navlink" href="/contact/#inquiry">Contact</a>
    </div>
  </div>
</header>

<main class="container page-shell">
  <section class="controls-panel" id="work" aria-labelledby="workTitle">
    <div>
      <p class="eyebrow">Archive</p>
      <h1 id="workTitle">Browse every album.</h1>
      <p class="muted" id="resultCount">Loading albums</p>
    </div>

    <div class="controls">
      <div class="pills" aria-label="Filter albums by category">
        <button class="pill active" data-filter="all" type="button">All</button>
        <button class="pill" data-filter="esports" type="button">Esports</button>
        <button class="pill" data-filter="sports" type="button">Sports</button>
        <button class="pill" data-filter="events" type="button">Events</button>
        <button class="pill" data-filter="travel" type="button">Travel</button>
      </div>
      <label class="search-wrap">
        <span class="sr-only">Search albums</span>
        <input id="search" class="search" placeholder="Search event, place, or category..." autocomplete="off" />
      </label>
    </div>
  </section>

  <section class="grid" id="grid" aria-live="polite"></section>
</main>

<script src="/data.js"></script>
<script src="/app.js"></script>

</body>
</html>
